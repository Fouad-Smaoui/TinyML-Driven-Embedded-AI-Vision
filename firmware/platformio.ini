; PlatformIO project for the ESP32 perception client.
;
; Replaces the original bare Arduino .ino-style main.cpp (which had no build
; configuration at all, an invalid `'''`-wrapped block, and an undefined
; `your_model_data` symbol) with a real, buildable project.
;
; Build:    pio run
; Flash:    pio run --target upload
; Monitor:  pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    tanakamasayuki/TensorFlowLite_ESP32@^1.0.0
    bblanchon/ArduinoJson@^7.0

build_flags =
    -std=gnu++17
