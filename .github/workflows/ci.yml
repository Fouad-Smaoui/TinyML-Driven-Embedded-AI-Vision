name: Perception CI

on:
  push:
    branches: [main]
    paths:
      - "perception/**"
      - "tests/**"
      - "app.py"
      - "enroll.py"
      - "models/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "perception/**"
      - "tests/**"
      - "app.py"
      - "enroll.py"
      - "models/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # dlib needs a compiler + cmake; matches docker/app.Dockerfile. With the
      # pip cache above, a cache hit reuses the already-built dlib wheel
      # instead of recompiling it from source on every run.
      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v
